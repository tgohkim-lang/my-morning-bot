name: Morning Bot Task

on:
  schedule:
    # POSIX cron 기준 (분 시 일 월 요일)
    # UTC 기준 23:00은 한국 시간(KST)으로 다음날 오전 08:00입니다.
    - cron: '0 23 * * *'
  workflow_dispatch: # 필요할 때 깃허브에서 버튼 눌러서 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot requests yfinance pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          # 유튜브와 제미나이 기능을 빼셨다면 아래 두 줄은 없어도 되지만, 
          # 혹시 나중에 다시 쓰실 수 있으니 유지해 두셔도 무방합니다.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python morning_bot.py
